name: Release extension and bridge

on:
  push:
    tags:
      - "extension-v*"

permissions:
  contents: write

jobs:
  package-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: bash scripts/package-extension.sh --version "${GITHUB_REF_NAME#extension-v}" --out-dir dist

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-extension
          path: dist/*

  package-bridge:
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - slug: macos-x64
            os: macos-13
            target: x86_64-apple-darwin
          - slug: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
          - slug: win-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Package MCP bridge (${{ matrix.slug }})
        shell: bash
        run: |
          bash scripts/package-mcp-bridge.sh \
            --version "${GITHUB_REF_NAME#extension-v}" \
            --slug "${{ matrix.slug }}" \
            --target "${{ matrix.target }}" \
            --out-dir dist

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-bridge-${{ matrix.slug }}
          path: dist/*

  publish-release:
    needs: [package-extension, package-bridge]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p dist
          # Flatten every artifact dir into dist/, merging the per-job
          # SHA256SUMS.txt files into one.
          find artifacts -type f -name '*.tar.gz' -exec cp {} dist/ \;
          find artifacts -type f -name '*.zip' -exec cp {} dist/ \;
          find artifacts -type f -name 'SHA256SUMS.txt' -exec cat {} >> dist/SHA256SUMS.txt \;
          echo "=== release files ===" && ls -la dist/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            dist/actions-json-overlay-runtime-*.zip
            dist/actions-json-mcp-*.tar.gz
            dist/SHA256SUMS.txt
