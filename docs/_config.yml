# GitHub Pages (Jekyll) configuration for the actions.json docs site.
#
# The docs contain JSONata workflow slots written as `{% ... %}` (for example
# `{% steps.findButton.output.clickable_center.x %}`). That is actions.json
# syntax, not Liquid. Without this, Jekyll's Liquid parser treats `{% steps %}`
# as an unknown template tag and the Pages build fails. Disabling Liquid
# rendering for the Markdown docs makes the braces literal while still
# rendering Markdown and applying the theme.
defaults:
  - scope:
      path: ""
    values:
      render_with_liquid: false
