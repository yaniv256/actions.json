<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>actions.json Overlay Runtime</title>
    <style>
      :root {
        --ink: #15171d;
        --muted: #626b7a;
        --line: #d9e0e9;
        --panel: #f6f8fb;
        --accent: #126b7d;
        --danger: #b64040;
        --ok: #24744a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 360px;
        margin: 0;
        color: var(--ink);
        background: #ffffff;
        font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        display: flex;
        gap: 8px;
        align-items: baseline;
        padding: 12px 14px 10px;
      }

      h1 {
        margin: 0;
        font-size: 15px;
        line-height: 1.2;
        letter-spacing: -0.01em;
      }

      .tag {
        padding: 1px 7px;
        border-radius: 999px;
        background: var(--panel);
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .actions {
        display: grid;
        gap: 7px;
        padding: 0 14px;
      }

      #tabNotice {
        margin: 0 14px 10px;
        padding: 9px 10px;
        border: 1px solid #f0d9a8;
        border-radius: 7px;
        background: #fff8e8;
        color: #7a5b13;
        font-size: 13px;
        line-height: 1.45;
      }

      #tabNotice[hidden] {
        display: none;
      }

      button {
        height: 36px;
        padding: 0 10px;
        border: 0;
        border-radius: 7px;
        background: var(--accent);
        color: #fff;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
      }

      button.secondary {
        background: #202836;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.52;
      }

      .session-card {
        display: grid;
        gap: 8px;
        margin: 12px 14px 0;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .session-card strong {
        font-size: 12px;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: var(--muted);
      }

      #voiceState {
        min-height: 18px;
        font-size: 13px;
      }

      .voice-controls {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 7px;
      }

      .voice-controls button {
        height: 32px;
      }

      .settings {
        margin-top: 12px;
        border-top: 1px solid var(--line);
      }

      .settings-label {
        display: block;
        padding: 10px 14px 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .settings iframe {
        display: block;
        width: 100%;
        height: 430px;
        border: 0;
        background: #fff;
      }

      #status {
        min-height: 18px;
        padding: 8px 14px 12px;
        color: var(--ok);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>actions.json</h1>
      <span class="tag">runtime</span>
    </header>
    <div id="tabNotice" role="alert" hidden></div>
    <div class="actions">
      <button id="authorize">Take control of this tab</button>
      <button id="openMenu" class="secondary">Open agent overlay</button>
    </div>
    <div class="session-card" aria-label="Session controls">
      <strong>Session</strong>
      <div id="voiceState">Session: checking...</div>
      <div class="voice-controls">
        <button id="startVoice" type="button">Start</button>
        <button id="muteVoice" type="button" class="secondary">Mute</button>
        <button id="stopVoice" type="button" class="secondary">Stop</button>
      </div>
    </div>
    <div class="settings">
      <span class="settings-label">Settings</span>
      <iframe title="actions.json settings" src="sidepanel.html?tab=config&surface=popup"></iframe>
    </div>
    <div id="status" role="status"></div>
    <script src="src/popup.js"></script>
  </body>
</html>
