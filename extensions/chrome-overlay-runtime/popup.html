<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>actions.json Overlay Runtime</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        color: #15171d;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 16px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 14px;
        color: #5d6372;
        font-size: 13px;
        line-height: 1.45;
      }

      label {
        display: block;
        margin-bottom: 6px;
        color: #5d6372;
        font-size: 12px;
        font-weight: 700;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        height: 34px;
        padding: 0 10px;
        border: 1px solid #dce1ea;
        border-radius: 7px;
        font: 13px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      button {
        width: 100%;
        height: 36px;
        margin-top: 12px;
        border: 0;
        border-radius: 7px;
        background: #156c80;
        color: white;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
      }

      button.secondary {
        background: #18202c;
      }

      #status {
        min-height: 18px;
        margin-top: 12px;
        color: #24744a;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>actions.json Overlay Runtime</h1>
    <p>Authorize this tab to connect to a local actions.json bridge. The bridge can call declared overlay actions.</p>
    <label for="bridgeUrl">Local bridge WebSocket URL</label>
    <input id="bridgeUrl" value="ws://127.0.0.1:17345/extension" />
    <button id="authorize">Authorize current tab</button>
    <button id="closeOverlay" class="secondary">Close overlay</button>
    <div id="status" role="status"></div>
    <script src="src/popup.js"></script>
  </body>
</html>
